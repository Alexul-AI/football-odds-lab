name: CI

on:
  push:
    branches: [main]
  # No branches filter: this project uses stacked claude/<feature> branches (a PR
  # based on another not-yet-merged PR's branch, not on main), so CI needs to run
  # against whatever base a PR actually targets, not just main.
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest
